<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BlueSafe Responsive Preview</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #eef2f8;
      color: #191f28;
      font-family: Pretendard, Inter, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    * { box-sizing: border-box; }
    button, select { font: inherit; }
    .preview-app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 312px minmax(0, 1fr);
    }
    .preview-side {
      height: 100vh;
      position: sticky;
      top: 0;
      overflow: auto;
      background: #fff;
      border-right: 1px solid #dfe5ee;
      padding: 18px;
    }
    .preview-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .preview-logo {
      width: 40px;
      height: 40px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      background: #1e3a8a;
      color: #fff;
      font-weight: 900;
    }
    .preview-brand h1 { margin: 0; font-size: 18px; line-height: 1.1; }
    .preview-brand p { margin: 3px 0 0; color: #6b7684; font-size: 12px; }
    .preview-control {
      display: grid;
      gap: 8px;
      margin: 14px 0;
    }
    .preview-control label {
      color: #6b7684;
      font-size: 12px;
      font-weight: 700;
    }
    .preview-control select {
      width: 100%;
      border: 1px solid #dfe5ee;
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
      color: #191f28;
    }
    .preview-list {
      display: grid;
      gap: 6px;
      margin-top: 16px;
    }
    .preview-list button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 10px 11px;
      text-align: left;
      background: transparent;
      color: #4e5968;
      cursor: pointer;
      font-weight: 700;
      line-height: 1.25;
    }
    .preview-list button:hover { background: #f2f4f6; }
    .preview-list button.active {
      background: #e8eefb;
      color: #1e3a8a;
    }
    .preview-section-title {
      margin: 18px 0 6px;
      color: #8b95a1;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .preview-main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 100vh;
    }
    .preview-top {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(238, 242, 248, .9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(223, 229, 238, .8);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .preview-title { min-width: 0; }
    .preview-title h2 {
      margin: 0;
      font-size: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .preview-title p {
      margin: 4px 0 0;
      color: #6b7684;
      font-size: 12px;
    }
    .preview-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 0 0 auto;
    }
    .preview-actions button {
      border: 1px solid #dfe5ee;
      border-radius: 12px;
      background: #fff;
      color: #333d4b;
      padding: 9px 11px;
      cursor: pointer;
      font-weight: 800;
      font-size: 13px;
    }
    .preview-actions button.active {
      background: #1e3a8a;
      border-color: #1e3a8a;
      color: #fff;
    }
    .stage {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      overflow: auto;
    }
    .mock-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 18px;
      border-bottom: 1px solid rgba(223, 229, 238, .8);
      background: rgba(255,255,255,.56);
    }
    .mock-pill {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid #dfe5ee;
      background: #fff;
      color: #4e5968;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .mock-pill.on {
      border-color: #b9efd9;
      background: #ebfbf4;
      color: #0c8f58;
    }
    .preview-toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: min(360px, calc(100vw - 36px));
      padding: 13px 15px;
      border-radius: 16px;
      background: #191f28;
      color: #fff;
      box-shadow: 0 18px 54px rgba(0,0,0,.24);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.45;
      z-index: 80;
    }
    .phone-stage {
      width: calc(375px * var(--scale, 1));
      height: calc(812px * var(--scale, 1));
      flex: 0 0 auto;
    }
    .phone-scale {
      width: 375px;
      height: 812px;
      transform: scale(var(--scale, 1));
      transform-origin: top left;
      border-radius: calc(28px / var(--scale, 1));
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(25,31,40,.08),
        0 22px 60px rgba(25,31,40,.18);
      background: #fff;
    }
    .mobile-picker {
      display: none;
      padding: 12px;
      background: #fff;
      border-bottom: 1px solid #dfe5ee;
      gap: 8px;
    }
    .mobile-picker select {
      width: 100%;
      border: 1px solid #dfe5ee;
      border-radius: 12px;
      padding: 11px 12px;
      background: #fff;
      color: #191f28;
      font-weight: 700;
    }
    @media (max-width: 900px) {
      .preview-app { grid-template-columns: 1fr; }
      .preview-side { display: none; }
      .mobile-picker { display: grid; }
      .preview-main { min-height: 100vh; }
      .preview-top {
        position: static;
        padding: 12px;
        align-items: flex-start;
      }
      .mock-bar { padding: 10px 12px; }
      .preview-actions { flex-wrap: wrap; justify-content: flex-end; }
      .stage { padding: 14px; align-items: start; }
    }
    @media (max-width: 520px) {
      .preview-top { display: grid; }
      .preview-actions { justify-content: start; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tokens.jsx"></script>
  <script type="text/babel" src="ui-kit.jsx"></script>
  <script type="text/babel" src="tenant-a.jsx"></script>
  <script type="text/babel" src="tenant-b.jsx"></script>
  <script type="text/babel" src="landlord.jsx"></script>

  <script type="text/babel">
    const { useEffect, useMemo, useState, useLayoutEffect, useRef } = React;

    const PALETTES = {
      navy: '#1E3A8A',
      indigo: '#2E4FB8',
      cyan: '#00C2C7',
      emerald: '#10A37F',
      coral: '#FF6A55',
    };

    const SCREEN_GROUPS = [
      {
        id: 'tenant-onboarding',
        title: 'Tenant / Onboarding & KYC',
        screens: [
          { id: 't01', label: '01 Entry', C: T01_Entry },
          { id: 't02', label: '02 Onboarding', C: T02_Onboarding },
          { id: 't03', label: '03 Toss verify', C: T03_Auth },
          { id: 't04', label: '04 ARC KYC', C: T04_KYC },
        ],
      },
      {
        id: 'tenant-contract',
        title: 'Tenant / Lease & Lockup',
        screens: [
          { id: 't05', label: '05 Invite landlord', C: T05_Invite },
          { id: 't06', label: '06 3-party lease', C: T06_Contract },
          { id: 't07', label: '07 Pay deposit', C: T07_Pay },
          { id: 't08', label: '08 Locked receipt', C: T08_Receipt },
        ],
      },
      {
        id: 'tenant-life',
        title: 'Tenant / Living-in Lifecycle',
        screens: [
          { id: 't09', label: '09 Home', C: T09_Home },
          { id: 't10', label: '10 Countdown', C: T10_Countdown },
          { id: 't11', label: '11 Safety report', C: T11_Report },
          { id: 't12', label: '12 Reputation grows', C: T12_SBT },
        ],
      },
      {
        id: 'tenant-bills',
        title: 'Tenant / Bills & Disputes',
        screens: [
          { id: 't13', label: '13 Utilities', C: T13_Bills },
          { id: 't14', label: '14 File dispute', C: T14_Dispute },
          { id: 't15', label: '15 Dispute status', C: T15_DisputeStatus },
          { id: 't16', label: '16 Verdict + refund', C: T16_DisputeResult },
        ],
      },
      {
        id: 'tenant-out',
        title: 'Tenant / Move-out & Return',
        screens: [
          { id: 't17', label: '17 Move-out check', C: T17_Moveout },
          { id: 't18', label: '18 Deposit returned', C: T18_Returned },
          { id: 't19', label: '19 Send abroad (FX)', C: T19_FX },
          { id: 't20', label: '20 Activity', C: T20_Activity },
        ],
      },
      {
        id: 'landlord-onboarding',
        title: 'Landlord / Invite & Verify',
        screens: [
          { id: 'l01', label: "01 You're invited", C: L01_Invited },
          { id: 'l02', label: '02 KYC type', C: L02_KYC },
          { id: 'l03', label: '03 Property reg.', C: L03_PropertyReg },
        ],
      },
      {
        id: 'landlord-contract',
        title: 'Landlord / Lease',
        screens: [
          { id: 'l04', label: '04 Review lease', C: L04_Review },
          { id: 'l05', label: '05 Signed', C: L05_Signed },
        ],
      },
      {
        id: 'landlord-ops',
        title: 'Landlord / Operations',
        screens: [
          { id: 'l06', label: '06 Home', C: L06_Home },
          { id: 'l07', label: '07 Property detail', C: L07_PropertyDetail },
          { id: 'l08', label: '08 Late rent auto pay', C: L08_LateRent },
          { id: 'l09', label: '09 Incoming dispute', C: L09_DisputeIncoming },
        ],
      },
      {
        id: 'landlord-end',
        title: 'Landlord / Earnings & End',
        screens: [
          { id: 'l10', label: '10 Income report', C: L10_Earnings },
          { id: 'l11', label: '11 Settle deposit', C: L11_DepositRelease },
          { id: 'l12', label: '12 Activity', C: L12_Activity },
        ],
      },
    ];

    const ALL_SCREENS = SCREEN_GROUPS.flatMap(group => group.screens.map(screen => ({ ...screen, group: group.title })));
    const SCREEN_INDEX = Object.fromEntries(ALL_SCREENS.map((screen, i) => [screen.id, i]));
    const INITIAL_MOCK = {
      kyc: false,
      contractSigned: false,
      escrowLocked: false,
      receiptMinted: false,
      billVerified: false,
      disputeOpen: false,
      verdictDone: false,
      depositReturned: false,
      fxSent: false,
      latestTx: null,
      txs: [],
    };

    function nextId(id) {
      const i = SCREEN_INDEX[id] ?? 0;
      return ALL_SCREENS[Math.min(ALL_SCREENS.length - 1, i + 1)].id;
    }

    function prevId(id) {
      const i = SCREEN_INDEX[id] ?? 0;
      return ALL_SCREENS[Math.max(0, i - 1)].id;
    }

    function makeTx(type) {
      const hash = (Math.random().toString(16).slice(2, 10) + Date.now().toString(16).slice(-8)).toUpperCase();
      return { type, hash, at: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) };
    }

    function useFitScale(ref) {
      const [scale, setScale] = useState(1);
      useLayoutEffect(() => {
        const update = () => {
          const el = ref.current;
          if (!el) return;
          const r = el.getBoundingClientRect();
          const maxW = Math.max(280, r.width - 24);
          const maxH = Math.max(420, window.innerHeight - r.top - 28);
          setScale(Math.min(maxW / TOKENS.W, maxH / TOKENS.H, 1));
        };
        update();
        window.addEventListener('resize', update);
        return () => window.removeEventListener('resize', update);
      }, [ref]);
      return scale;
    }

    function App() {
      const [selectedId, setSelectedId] = useState('t01');
      const [lang, setLang] = useState('ko');
      const [palette, setPalette] = useState('navy');
      const [mock, setMock] = useState(INITIAL_MOCK);
      const [toast, setToast] = useState('');
      const stageRef = useRef(null);
      const scale = useFitScale(stageRef);
      const brand = PALETTES[palette] || PALETTES.navy;
      const current = useMemo(() => ALL_SCREENS.find(s => s.id === selectedId) || ALL_SCREENS[0], [selectedId]);
      const Screen = current.C;

      const select = (id) => setSelectedId(id);

      const notify = (message) => {
        setToast(message);
        window.clearTimeout(window.__blueSafeToast);
        window.__blueSafeToast = window.setTimeout(() => setToast(''), 2200);
      };

      const pushTx = (type, message) => {
        const tx = makeTx(type);
        setMock(prev => ({ ...prev, latestTx: tx, txs: [tx, ...prev.txs].slice(0, 6) }));
        notify(`${message} · ${type} ${tx.hash.slice(0, 6)}...${tx.hash.slice(-4)}`);
      };

      const applyMockForScreen = (id) => {
        const txByScreen = {
          t03: ['CredentialAccept', 'Toss/KYC mock 인증 완료'],
          t04: ['DIDSet', '외국인 KYC DID mock 기록'],
          t06: ['SignerListSet', '3자 멀티시그 mock 설정'],
          t07: ['EscrowCreate', '보증금 Escrow mock 생성'],
          t08: ['NFTokenMint', '계약/영수증 NFT mock 발행'],
          t13: ['MemoHash', '공과금 고지서 hash mock 기록'],
          t14: ['DisputeOpen', '분쟁 접수 mock 생성'],
          t16: ['VerifierVote', 'Verifier 판정 mock 완료'],
          t18: ['EscrowFinish', '보증금 반환 mock 실행'],
          t19: ['Payment', '본국 송금 mock 실행'],
          l05: ['SignerListSet', '임대인 계약 서명 mock 완료'],
          l08: ['Payment', '미납 월세 자동 차감 mock 실행'],
          l11: ['EscrowFinish', '임대인 반환 승인 mock 실행'],
        };
        const flagsByScreen = {
          t03: { kyc: true },
          t04: { kyc: true },
          t06: { contractSigned: true },
          t07: { escrowLocked: true },
          t08: { receiptMinted: true },
          t13: { billVerified: true },
          t14: { disputeOpen: true },
          t16: { verdictDone: true },
          t18: { depositReturned: true },
          t19: { fxSent: true },
          l05: { contractSigned: true },
          l08: { billVerified: true },
          l11: { depositReturned: true },
        };
        if (flagsByScreen[id]) setMock(prev => ({ ...prev, ...flagsByScreen[id] }));
        if (txByScreen[id]) pushTx(txByScreen[id][0], txByScreen[id][1]);
      };

      const handlePhoneClick = (event) => {
        const button = event.target.closest('button');
        if (!button) return;
        event.preventDefault();
        event.stopPropagation();
        const text = button.textContent.trim();
        if (!text) {
          select(prevId(selectedId));
          notify('이전 화면으로 이동');
          return;
        }
        applyMockForScreen(selectedId);
        select(nextId(selectedId));
      };

      useEffect(() => {
        const onKey = (event) => {
          if (event.key === 'ArrowRight') select(nextId(selectedId));
          if (event.key === 'ArrowLeft') select(prevId(selectedId));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [selectedId]);

      return (
        <div className="preview-app">
          <aside className="preview-side">
            <div className="preview-brand">
              <div className="preview-logo">B</div>
              <div>
                <h1>BlueSafe</h1>
                <p>Original design responsive preview</p>
              </div>
            </div>

            <div className="preview-control">
              <label>Language</label>
              <select value={lang} onChange={e => setLang(e.target.value)}>
                <option value="ko">ko</option>
                <option value="en">en</option>
              </select>
            </div>
            <div className="preview-control">
              <label>Brand color</label>
              <select value={palette} onChange={e => setPalette(e.target.value)}>
                <option value="navy">navy</option>
                <option value="indigo">indigo</option>
                <option value="cyan">cyan</option>
                <option value="emerald">emerald</option>
                <option value="coral">coral</option>
              </select>
            </div>

            <div className="preview-list">
              {SCREEN_GROUPS.map(group => (
                <React.Fragment key={group.id}>
                  <div className="preview-section-title">{group.title}</div>
                  {group.screens.map(screen => (
                    <button key={screen.id} className={screen.id === selectedId ? 'active' : ''} onClick={() => select(screen.id)}>
                      {screen.label}
                    </button>
                  ))}
                </React.Fragment>
              ))}
            </div>
          </aside>

          <main className="preview-main">
            <div className="mobile-picker">
              <select value={selectedId} onChange={e => select(e.target.value)}>
                {SCREEN_GROUPS.map(group => (
                  <optgroup key={group.id} label={group.title}>
                    {group.screens.map(screen => <option key={screen.id} value={screen.id}>{screen.label}</option>)}
                  </optgroup>
                ))}
              </select>
            </div>

            <header className="preview-top">
              <div className="preview-title">
                <h2>{current.label}</h2>
                <p>{current.group} · 원본 디자인 컴포넌트 + mock button flow · scale {scale.toFixed(2)}</p>
              </div>
              <div className="preview-actions">
                <button onClick={() => {
                  const idx = ALL_SCREENS.findIndex(s => s.id === selectedId);
                  select(ALL_SCREENS[Math.max(0, idx - 1)].id);
                }}>Prev</button>
                <button onClick={() => {
                  const idx = ALL_SCREENS.findIndex(s => s.id === selectedId);
                  select(ALL_SCREENS[Math.min(ALL_SCREENS.length - 1, idx + 1)].id);
                }}>Next</button>
                <button className={lang === 'ko' ? 'active' : ''} onClick={() => setLang(lang === 'ko' ? 'en' : 'ko')}>{lang}</button>
              </div>
            </header>

            <div className="mock-bar">
              <span className={'mock-pill ' + (mock.kyc ? 'on' : '')}>KYC {mock.kyc ? '완료' : '대기'}</span>
              <span className={'mock-pill ' + (mock.contractSigned ? 'on' : '')}>계약 {mock.contractSigned ? '서명됨' : '미서명'}</span>
              <span className={'mock-pill ' + (mock.escrowLocked ? 'on' : '')}>Escrow {mock.escrowLocked ? '잠김' : '대기'}</span>
              <span className={'mock-pill ' + (mock.receiptMinted ? 'on' : '')}>NFT {mock.receiptMinted ? '발행' : '대기'}</span>
              <span className={'mock-pill ' + (mock.billVerified ? 'on' : '')}>공과금 {mock.billVerified ? '검증' : '대기'}</span>
              <span className={'mock-pill ' + (mock.disputeOpen ? 'on' : '')}>분쟁 {mock.disputeOpen ? '진행' : '없음'}</span>
              <span className={'mock-pill ' + (mock.depositReturned ? 'on' : '')}>반환 {mock.depositReturned ? '완료' : '대기'}</span>
              {mock.latestTx && <span className="mock-pill on">최근 TX {mock.latestTx.type} · {mock.latestTx.hash.slice(0, 6)}...{mock.latestTx.hash.slice(-4)}</span>}
            </div>

            <section ref={stageRef} className="stage">
              <div className="phone-stage" style={{ '--scale': scale }}>
                <div className="phone-scale" style={{ '--scale': scale }} onClick={handlePhoneClick}>
                  <Screen lang={lang} brand={brand} />
                </div>
              </div>
            </section>
            {toast && <div className="preview-toast">{toast}</div>}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
