services:
  postgres:
    image: postgres:16-alpine
    container_name: bluesafe-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bluesafe_dev
    ports:
      # Host 5432 is often taken by a local Postgres; override if needed.
      - "${BLUESAFE_POSTGRES_PORT:-5433}:5432"
    volumes:
      - bluesafe_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bluesafe_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bluesafe-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bluesafe_pg_data:
